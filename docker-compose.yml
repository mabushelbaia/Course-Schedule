services:
  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped

  web:
    build: .
    container_name: course-schedule-web
    ports:
      - "8000:8000"
    environment:
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
      - START_DATE=${START_DATE:-}
      - END_DATE=${END_DATE:-}
    depends_on:
      - flaresolverr
    restart: unless-stopped
