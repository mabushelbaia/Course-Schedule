<div>
  <h2>Schedule Parsed Successfully</h2>
  <table>
    <thead>
      <tr>
        <th>Code</th>
        <th>Title</th>
        <th>Section</th>
        <th>Days</th>
        <th>Time</th>
        <th>Room</th>
      </tr>
    </thead>
    <tbody>
      {% for course in courses %}
      <tr>
        <td>{{ course["Course Label"] }}</td>
        <td>{{ course["Course Title"] }}</td>
        <td>{{ course["Section"] }}</td>
        <td>{{ course["Days"] }}</td>
        <td>{{ course["Time"] }}</td>
        <td>{{ course["Room"] }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <a href="/download/{{ id }}" class="btn btn-success">Download .ics</a>
</div>
