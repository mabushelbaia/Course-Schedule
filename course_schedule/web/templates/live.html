{% extends "base.html" %}
{% block title %}Live Fetch{% endblock %}
{% block content %}
<h1>Live Fetch from Ritaj</h1>
<p class="subtitle">Enter your Ritaj credentials to fetch your schedule directly</p>

<form hx-post="/live" hx-target="#result" hx-indicator="#spinner">
  <div class="form-group">
    <label for="username">Ritaj Username</label>
    <input type="text" name="username" required>
  </div>
  <div class="form-group">
    <label for="password">Ritaj Password</label>
    <input type="password" name="password" required>
  </div>
  <button type="submit" class="btn btn-primary">Fetch Schedule</button>
  <span id="spinner" class="htmx-indicator"><span class="spinner"></span> Fetching schedule...</span>
</form>

<div id="result"></div>
{% endblock %}
